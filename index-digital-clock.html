<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Digital Clock</title>
  <link rel="icon" type="image/svg+xml" href="clock-favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="Digital Clock">
  <meta name="theme-color" content="#000000">
  <!--
Weather: Open-Meteo (no API key). Optional future provider:
<script>window.__WEATHER_API_KEY__ = 'your-key';</script>
const WEATHER_API_KEY = window.__WEATHER_API_KEY__ || 'REPLACE_ME';

  <style type="text/css">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Roboto+Mono:wght@500;600;700&display=swap');

    @font-face {
      font-family: 'Digital-7';
      src: url('fonts/digital-7.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    body {
      background-color: black;
      margin: 0;
      min-height: 100vh;
    }

    .digit_clock_app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
      box-sizing: border-box;
    }

    .digit_clock_header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      max-width: 1500px;
      margin: 0 auto 1.5rem;
      flex-shrink: 0;
    }

    .digit_clock_header_row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .digit_clock_brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #66ff99;
      min-width: 0;
    }

    .digit_clock_logo {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
    }

    .digit_clock_title {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .digit_clock_menu_toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 44px;
      padding: 0.5rem;
      color: #66ff99;
      background-color: #111;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
    }

    .digit_clock_menu_toggle:hover {
      border-color: #66ff99;
    }

    .digit_clock_menu_toggle:focus-visible {
      outline: 2px solid #66ff99;
      outline-offset: 2px;
    }

    .digit_clock_menu_toggle svg {
      width: 24px;
      height: 24px;
      display: block;
      transition: transform 0.3s ease;
    }

    .digit_clock_menu_toggle[aria-expanded="true"] {
      border-color: #66ff99;
      background-color: #1a3d2a;
    }

    .digit_clock_menu_toggle[aria-expanded="true"] svg {
      transform: rotate(90deg);
    }

    .digit_clock_toolbar {
      display: grid;
      grid-template-rows: 0fr;
      width: 100%;
      margin-top: 0;
      opacity: 0;
      overflow: hidden;
      justify-content: flex-end;
      transition: grid-template-rows 0.3s ease, margin-top 0.3s ease, opacity 0.25s ease;
    }

    .digit_clock_toolbar.is-open {
      grid-template-rows: 1fr;
      margin-top: 0.5rem;
      opacity: 1;
    }

    .digit_clock_toolbar:not(.is-open) .digit_clock_controls {
      pointer-events: none;
    }

    .digit_clock_toolbar .digit_clock_controls {
      min-height: 0;
      overflow: hidden;
      transform: translateY(-0.5rem);
      transition: transform 0.3s ease;
    }

    .digit_clock_toolbar.is-open .digit_clock_controls {
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {

      .digit_clock_toolbar,
      .digit_clock_toolbar .digit_clock_controls,
      .digit_clock_menu_toggle svg {
        transition: none;
      }

      .digit_clock_toolbar .digit_clock_controls,
      .digit_clock_toolbar.is-open .digit_clock_controls {
        transform: none;
      }
    }

    .digit_clock_controls {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background-color: #0a0a0a;
      border: 2px solid #222;
      border-radius: 10px;
      box-shadow: 0 6px 16px 0 rgb(255 255 255 / 10%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .toggle_group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .toggle_label {
      color: #66ff99;
      font-size: 12px;
    }

    .toggle_btn {
      font-family: inherit;
      font-size: 12px;
      color: #66ff99;
      background-color: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.35rem 0.6rem;
      cursor: pointer;
      transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      min-width: 40px;
    }

    .toggle_btn:hover {
      border-color: #66ff99;
    }

    .toggle_btn.is-active {
      background-color: #1a3d2a;
      border-color: #66ff99;
      color: #a8ffcc;
      font-weight: bold;
    }

    .toggle_btn:focus-visible {
      outline: 2px solid #66ff99;
      outline-offset: 2px;
    }

    .digit_clocks_row {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .digit_clocks_container {
      display: grid;
      grid-template-columns: 1fr;
      grid-auto-rows: 1fr;
      align-items: stretch;
      justify-items: center;
      gap: 1.5rem;
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
    }

    .digit_clock_city_name,
    .digit_clock_current_weather {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #66ff99;
      font-size: 20px;
      text-align: center;
      padding-bottom: 10px;
    }

    .digit_clock_city_name {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 2.3em;
      line-height: 1.15;
    }

    .digit_clock_current_weather {
      padding-top: 20px;
      padding-bottom: 0;
      font-size: 18px;
    }

    .digit_clock_current_weather .weather_temp,
    .digit_clock_current_weather .weather_desc {
      display: block;
    }

    .digit_clock_time {
      font-family: 'Roboto Mono', 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
      color: #66ff99;
      font-size: 35px;
      text-align: center;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: baseline;
      justify-content: center;
      column-gap: 0.18em;
      white-space: nowrap;
    }

    .digit_clock_time span {
      display: inline-block;
      min-width: 0;
      margin: 0;
      padding: 0;
    }

    .digit_clock_time .hour,
    .digit_clock_time .minute,
    .digit_clock_time .second {
      width: 2ch;
      text-align: right;
    }

    .digit_clock_time .is_double_one {
      letter-spacing: 0;
    }

    .digit_clock_time .has_one {
      letter-spacing: 0;
    }

    .digit_clock_time .time_separator {
      text-align: center;
      letter-spacing: 0;
    }

    .digit_clock_time .ampm {
      font-size: 26px;
      margin-left: 0.25em;
    }

    .digit_clock_date,
    .digit_clock_date_short {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #66ff99;
      font-size: 20px;
      text-align: center;
      padding-top: 20px;
    }

    .digit_clock_date_short {
      font-size: 24px;
    }

    .digital_clock_wrapper {
      border: 2px solid #222;
      box-shadow: 0 10px 16px 0 rgb(255 255 255 / 10%),
        0 6px 20px 0 rgb(255 255 255 / 10%) !important;
      padding: 1rem;
      width: 100%;
      max-width: min(480px, 100%);
      box-sizing: border-box;
      text-align: center;
      border-radius: 15px;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      height: 100%;
    }

    @media only screen and (min-width: 768px) {
      .digit_clock_title {
        font-size: 18px;
      }

      .digit_clock_logo {
        width: 34px;
        height: 34px;
      }

      .digit_clock_header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }

      .digit_clock_header_row {
        display: flex;
        flex: 1;
        justify-content: flex-start;
        align-items: center;
        width: auto;
      }

      .digit_clock_menu_toggle {
        display: none;
      }

      .digit_clock_toolbar {
        display: flex;
        grid-template-rows: none;
        margin-top: 0;
        width: auto;
        opacity: 1;
        overflow: visible;
        justify-content: flex-end;
        transition: none;
      }

      .digit_clock_toolbar .digit_clock_controls {
        transform: none;
        overflow: visible;
        transition: none;
        pointer-events: auto;
      }

      .digit_clock_toolbar:not(.is-open) .digit_clock_controls {
        pointer-events: auto;
      }

      .digit_clocks_container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        justify-items: stretch;
      }

      .digital_clock_wrapper {
        padding: 25px;
        max-width: none;
      }

      .digit_clock_time .hour,
      .digit_clock_time .minute,
      .digit_clock_time .second {
        width: 2ch;
      }

      .digit_clock_time {
        font-size: 35px;
      }

      .digit_clock_time .ampm {
        font-size: 30px;
      }

      .digit_clock_date,
      .digit_clock_date_short,
      .digit_clock_city_name,
      .digit_clock_current_weather {
        font-size: 25px;
      }

      .digit_clock_date_short {
        font-size: 30px;
      }

      .digit_clock_current_weather {
        font-size: 22px;
      }
    }

    @media only screen and (min-width: 1024px) {
      .digit_clock_title {
        font-size: 22px;
      }

      .digit_clock_logo {
        width: 38px;
        height: 38px;
      }

      .digit_clock_time .hour,
      .digit_clock_time .minute,
      .digit_clock_time .second {
        width: 2ch;
      }

      .digit_clock_time {
        font-size: 45px;
      }

      .digit_clock_time .ampm {
        font-size: 30px;
      }

      .digit_clock_date,
      .digit_clock_date_short,
      .digit_clock_city_name,
      .digit_clock_current_weather {
        font-size: 35px;
      }

      .digit_clock_date_short {
        font-size: 40px;
      }

      .digit_clock_current_weather {
        font-size: 30px;
      }
    }

    @media only screen and (min-width: 1280px) {
      .digit_clocks_container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>

</head>

  <script>
    // Optional future providers (do not commit real keys):
    // const WEATHER_API_KEY = window.__WEATHER_API_KEY__ || 'REPLACE_ME';

    const TRANSLATIONS = {

    const uiState = {

    const CLOCK_CONFIG = [

    const WEATHER_CONFIG = [
      {

        latitude: 36.1627,
        longitude: -86.7816,
        cacheKey: 'digit_clock_weather_nashville_v1',

        label: 'Puerto Vallarta',

      {

        cacheKey: 'digit_clock_weather_tepic_v1',

    ];
    const WEATHER_CACHE_TTL_MS = 10 * 60 * 1000;
    const WEATHER_API_BASE =
      'https://api.open-meteo.com/v1/forecast?current=temperature_2m,weather_code&temperature_unit=fahrenheit';
    let clockBindings = [];
    let clockTimerId = null;
    function renderUtilityCards() {
      const container = document.getElementById('clock-utilities');
      if (!container) return;
      container.textContent = '';
      UTILITY_CARDS.forEach((utility) => {
        const card = document.createElement('section');
        card.className = `digital_clock_wrapper clock_utility_card clock_utility_card--${utility.accent}`;

        const header = document.createElement('div');
        header.className = 'clock_utility_header';

        if (utility.iconSrc) {
          const icon = document.createElement('img');
          icon.className = 'clock_utility_icon';
          icon.src = utility.iconSrc;
          icon.alt = utility.iconAlt || '';
          if (!utility.iconAlt) icon.setAttribute('aria-hidden', 'true');
          header.appendChild(icon);
        }

        const title = document.createElement('h2');
        title.className = 'clock_utility_title';
        title.textContent = utility.title;
        header.appendChild(title);

        const description = document.createElement('p');
        description.className = 'clock_utility_description';
        description.textContent = utility.description;

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'clock_launch_btn';
        button.id = utility.buttonId;
        button.textContent = utility.buttonLabel;

        card.append(header, description, button);
        container.appendChild(card);
      });
    }
    function detectBrowserLanguage() {
      const lang = (navigator.language || 'en').toLowerCase();
      return lang.startsWith('es') ? 'es' : 'en';
    }
    function loadPreferences() {
      try {
        const raw = localStorage.getItem(PREFERENCES_KEY);
        if (!raw) {
          return null;
        }
        const parsed = JSON.parse(raw);
        if (!parsed || (parsed.unit !== 'F' && parsed.unit !== 'C')) {
          return null;
        }
        if (parsed.language !== 'en' && parsed.language !== 'es') {
          return null;
        }
        return parsed;
      } catch {
        return null;
      }
    }
    function savePreferences() {
      try {
        localStorage.setItem(
          PREFERENCES_KEY,
          JSON.stringify({ unit: uiState.unit, language: uiState.language }),
        );
      } catch {
        /* storage unavailable */
      }
    }
    function initUIState() {
      const saved = loadPreferences();
      if (saved) {
        uiState.unit = saved.unit;
        uiState.language = saved.language;
      } else {
        uiState.unit = 'F';
        uiState.language = detectBrowserLanguage();
      }
    }
    function getLocale() {
      return uiState.language === 'es' ? 'es-US' : 'en-US';
    }
    function t(key) {
      return TRANSLATIONS[uiState.language][key];
    }
    function pad2(value) {
      const str = String(value);
      return str.length < 2 ? `0${str}` : str;
    }
    function partsToMap(parts) {
      return parts.reduce((acc, part) => {
        if (part.type !== 'literal') {
          acc[part.type] = part.value;
        }
        return acc;
      }, {});
    }
    function formatClockDataForZone(timeZone, now = new Date()) {
      const locale = getLocale();
      const timeFormatter = new Intl.DateTimeFormat(locale, {
        timeZone,
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit',
        hour12: true,
      });
      const timeParts = partsToMap(timeFormatter.formatToParts(now));
      const dateLongFormatter = new Intl.DateTimeFormat(locale, {
        timeZone,
        weekday: 'short',
        month: 'long',
        day: 'numeric',
        year: 'numeric',
      });
      const dateLongParts = partsToMap(dateLongFormatter.formatToParts(now));
      const dateLong = `${dateLongParts.weekday}, ${dateLongParts.month} ${dateLongParts.day},
${dateLongParts.year}`;
      const dateShortFormatter = new Intl.DateTimeFormat(locale, {
        timeZone,
        month: '2-digit',
        day: '2-digit',
        year: 'numeric',
      });
      const dateShortParts = partsToMap(dateShortFormatter.formatToParts(now));
      const dateShort = `${dateShortParts.month} / ${dateShortParts.day}
/ ${dateShortParts.year}`;
      return {
        hour: timeParts.hour,
        minute: pad2(timeParts.minute),
        second: pad2(timeParts.second),
        ampm: timeParts.dayPeriod || '',
        dateLong,
        dateShort,
      };
    }
    function setTextIfChanged(element, value) {
      if (element && element.textContent !== value) {
        element.textContent = value;
      }
    }
    function setClockPartText(element, value) {
      setTextIfChanged(element, value);
      if (element) {
        const text = String(value);
        element.classList.toggle('is_double_one', text === '11');
        element.classList.toggle('has_one', text !== '11' && text.length > 1 && text.includes('1'));
      }
    }
    function bindClockRoots(config) {
      return config
        .map((entry) => {
          const root = document.querySelector(`[data-clock-id="${entry.id}"]`);
          if (!root) {
            return null;
          }
          const timeEl = root.querySelector('.digit_clock_time');
          return {
            config: entry,
            hour: timeEl.querySelector('.hour'),
            minute: timeEl.querySelector('.minute'),
            second: timeEl.querySelector('.second'),
            ampm: timeEl.querySelector('.ampm'),
            date: root.querySelector('.digit_clock_date'),
            dateShort: root.querySelector('.digit_clock_date_short'),
          };
        })
        .filter(Boolean);
    }
    function updateClockDom(refs, data) {
      setClockPartText(refs.hour, data.hour);
      setClockPartText(refs.minute, data.minute);
      setClockPartText(refs.second, data.second);
      setTextIfChanged(refs.ampm, data.ampm);
      setTextIfChanged(refs.date,
        data.dateLong);
      setTextIfChanged(refs.dateShort, data.dateShort);
    }
    function tickAllClocks(bindings) {
      try {
        const now = new Date();
        bindings.forEach((refs) => {
          const data = formatClockDataForZone(refs.config.timeZone, now);
          updateClockDom(refs, data);
        });
      } catch {
        /* keep clocks running; no console spam */
      }
    }
    function scheduleClockTimer(bindings) {
      if (clockTimerId !== null) {
        clearTimeout(clockTimerId);
      }
      const runTick = () => {
        tickAllClocks(bindings);
        clockTimerId = setTimeout(runTick, 1000);
      };
      runTick();
    }
    function getWeatherDescription(weatherCode) {
      const descriptions = TRANSLATIONS[uiState.language].weatherDescriptions;
      return descriptions[weatherCode] || t('currentConditions');
    }
    function convertTemperature(temperatureF) {
      if (uiState.unit === 'C') {
        return Math.round(((temperatureF - 32) * 5) / 9);
      }
      return Math.round(temperatureF);
    }
    function getTemperatureSymbol() {
      return uiState.unit === 'C' ? '°C' : '°F';
    }
    function formatWeatherDisplay(temperatureF, weatherCode) {
      const temp = convertTemperature(temperatureF);
      const description = getWeatherDescription(weatherCode);
      return {
        temperature: `${t('currentWeather')}: ${temp}${getTemperatureSymbol()},`,
        description,
      };
    }
    function normalizeWeatherPayload(cached) {
      if (!cached) {
        return null;
      }
      if (typeof cached.weatherCode === 'number') {
        return cached;
      }
      return {
        fetchedAt: cached.fetchedAt,
        temperatureF: cached.temperatureF,
        weatherCode: null,
      };
    }
    function storeWeatherData(entryId, payload) {
      weatherLiveData[entryId] = payload;
    }
    function renderWeatherEntry(entry, payload, status) {
      if (status === 'loading') {
        renderWeather(entry, t('loadingWeather'));
        return;
      }
      if (status === 'error') {
        renderWeather(entry, t('weatherUnavailable'));
        return;
      }
      if (payload && payload.temperatureF != null) {
        const code = payload.weatherCode != null ? payload.weatherCode : null;
        renderWeather(
          entry,
          formatWeatherDisplay(payload.temperatureF, code),
        );
      }
    }
    function renderAllWeather() {
      WEATHER_CONFIG.forEach((entry) => {
        const live = weatherLiveData[entry.id];
        const status = weatherStatusById[entry.id];
        if (live) {
          renderWeatherEntry(entry, live, 'data');
        } else if (status === 'loading') {
          renderWeatherEntry(entry, null, 'loading');
        } else if (status === 'error') {
          renderWeatherEntry(entry, null, 'error');
        }
      });
    }
    function updateControlPanelUI() {
      document.querySelectorAll('[data-unit]').forEach((btn) => {
        const isActive = btn.dataset.unit === uiState.unit;
        btn.classList.toggle('is-active', isActive);
        btn.setAttribute('aria-pressed', String(isActive));
      });
      document.querySelectorAll('[data-lang]').forEach((btn) => {
        const isActive = btn.dataset.lang === uiState.language;
        btn.classList.toggle('is-active', isActive);
        btn.setAttribute('aria-pressed', String(isActive));
      });
      document.documentElement.lang = uiState.language;
    }
    function isMobileViewport() {
      return !window.matchMedia('(min-width: 768px)').matches;
    }
    function closeMobileSettingsMenu() {
      const toolbar = document.getElementById('digit_clock_toolbar');
      const toggle = document.getElementById('digit_clock_menu_toggle');
      if (!toolbar || !toggle) {
        return;
      }
      toolbar.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
    }
    function setUnit(unit) {
      if (uiState.unit === unit) {
        return;
      }
      uiState.unit = unit;
      savePreferences();
      updateControlPanelUI();
      renderAllWeather();
      if (isMobileViewport()) {
        closeMobileSettingsMenu();
      }
    }
    function setLanguage(language) {
      if (uiState.language === language) {
        return;
      }
      uiState.language = language;
      savePreferences();
      updateControlPanelUI();
      renderAllWeather();
      if (clockBindings.length) {
        tickAllClocks(clockBindings);
      }
      if (isMobileViewport()) {
        closeMobileSettingsMenu();
      }
    }
    function initMobileSettingsMenu() {
      const toggle = document.getElementById('digit_clock_menu_toggle');
      const toolbar = document.getElementById('digit_clock_toolbar');
      if (!toggle || !toolbar) {
        return;
      }
      toggle.addEventListener('click', () => {
        if (!isMobileViewport()) {
          return;
        }
        const isOpen = toolbar.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', String(isOpen));
      });
      window.matchMedia('(min-width: 768px)').addEventListener('change', (e) => {
        if (e.matches) {
          closeMobileSettingsMenu();
        }
      });
    }
    function initControlPanel() {
      updateControlPanelUI();
      document.querySelectorAll('[data-unit]').forEach((btn) => {
        btn.addEventListener('click', () => setUnit(btn.dataset.unit));
      });
      document.querySelectorAll('[data-lang]').forEach((btn) => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
      });
    }
    function buildWeatherApiUrl(latitude, longitude) {
      return `${WEATHER_API_BASE}&latitude=${latitude}&longitude=${longitude}`;
    }
    function getWeatherElement(entry) {
      return (
        document.querySelector(`[data-weather-id="${entry.id}"]`)
        ||
        (entry.id
          === 'nashville' ? document.getElementById('digit_clock_current_weather') : null)
      );
    }
    function renderWeather(entry, content) {
      const el = getWeatherElement(entry);
      if (!el) {
        return;
      }
      const tempEl = el.querySelector('.weather_temp');
      const descEl = el.querySelector('.weather_desc');
      if (typeof content === 'string') {
        setTextIfChanged(tempEl, content);
        setTextIfChanged(descEl, '');
        return;
      }
      setTextIfChanged(tempEl, content.temperature);
      setTextIfChanged(descEl, content.description);
    }
    function readWeatherCache(cacheKey) {
      try {
        const raw = localStorage.getItem(cacheKey);
        if (!raw) {
          return null;
        }
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed.fetchedAt !== 'number') {
          return null;
        }
        return parsed;
      } catch {
        return null;
      }
    }
    function writeWeatherCache(cacheKey, payload) {
      try {
        localStorage.setItem(cacheKey, JSON.stringify(payload));
      } catch {
        /* storage unavailable */
      }
    }
    function isWeatherCacheFresh(cache) {
      return cache && Date.now()
        - cache.fetchedAt < WEATHER_CACHE_TTL_MS;
    }
    async function fetchCurrentWeather(entry) {
      const response = await fetch(buildWeatherApiUrl(entry.latitude, entry.longitude));
      if (!response.ok) {
        throw new Error('Weather fetch failed');
      }
      const data = await response.json();
      const current = data && data.current;
      if (!current || current.temperature_2m == null) {
        throw new Error('Invalid weather payload');
      }
      return {
        fetchedAt: Date.now(),
        temperatureF: current.temperature_2m,
        weatherCode: current.weather_code,
      };
    }
    async function obtainCurrentWeather(entry) {
      const cached = normalizeWeatherPayload(readWeatherCache(entry.cacheKey));
      if (cached && isWeatherCacheFresh(cached)) {
        storeWeatherData(entry.id,
          cached);
        weatherStatusById[entry.id]
          = 'data';
        renderWeatherEntry(entry, cached, 'data');
        return;
      }
      if (cached) {
        storeWeatherData(entry.id,
          cached);
        weatherStatusById[entry.id]
          = 'data';
        renderWeatherEntry(entry, cached, 'data');
      } else {
        weatherStatusById[entry.id]
          = 'loading';
        renderWeatherEntry(entry, null, 'loading');
      }
      try {
        const fresh = await fetchCurrentWeather(entry);
        writeWeatherCache(entry.cacheKey, fresh);
        storeWeatherData(entry.id,
          fresh);
        weatherStatusById[entry.id]
          = 'data';
        renderWeatherEntry(entry, fresh, 'data');
      } catch {
        if (cached) {
          storeWeatherData(entry.id,
            cached);
          weatherStatusById[entry.id]
            = 'data';
          renderWeatherEntry(entry, cached, 'data');
        } else {
          weatherStatusById[entry.id]
            = 'error';
          renderWeatherEntry(entry, null, 'error');
        }
      }
    }
    function obtainAllWeather() {
      WEATHER_CONFIG.forEach((entry) => {
        obtainCurrentWeather(entry);
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      renderUtilityCards();
      initUIState();
      initMobileSettingsMenu();
      initControlPanel();
      clockBindings = bindClockRoots(CLOCK_CONFIG);
      if (clockBindings.length) {
        tickAllClocks(clockBindings);
        scheduleClockTimer(clockBindings);
      }
      obtainAllWeather();
    });
  </script>
  <script src="js/sprints-app.js"></script>
</body>
